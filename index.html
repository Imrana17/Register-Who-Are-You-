<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Who Are You</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <link rel="stylesheet" href="js/bootstrap.js">
    <style>
h1{
    font-family: monospace;
}
.card{
width: 500px;

}
    </style>
</head>
<body>
    <header>
      <h1 class="text-dark text-center">Tell me about Yourself</h1>
    </header>

    <div class="d-flex justify-content-center align-items-center">
      <div class="card border-dark">
        <div class="card-header bg-transparent border-0">
       </div>
        <div class="card-body">


          <form class="row g-3">
            <div class="col-md-6">
              <label for="inputEmail4" class="form-label">first Name</label>
              <input type="text" class="form-control" id="inputEmail4">
            </div>
            <div class="col-md-6">
              <label for="inputPassword4" class="form-label">Last Name</label>
              <input type="text" class="form-control" id="inputPassword4">
            </div>
            <div class="col-12">
              <label for="inputAddress" class="form-label">Age</label>
              <input type="number" class="form-control" id="inputAddress">
            </div>
            <div class="col-12">
              <label for="inputAddress2" class="form-label">Location</label>
              <input type="text" class="form-control" id="inputAddress2" placeholder="continent, country, city">
            </div>
            <div class="col-md-12">
              <label for="inputState" class="form-label">Gender</label>
              <select id="inputState" class="form-select">
                <option selected>Select</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault1" checked>
                <label class="form-check-label" for="flexRadioDefault1">
                  Single
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="flexRadioDefault" id="flexRadioDefault2">
                <label class="form-check-label" for="flexRadioDefault2">
                  Married
                </label>
              </div>
            </div>


        </div>
        <div class="card-footer d-flex justify-content-center align-items-center bg-transparent border-0 col-12">
          <button type="submit" class="btn btn-lg btn-outline-dark">Submit</button>
        </div>
            </div>
    </div>

</html>
